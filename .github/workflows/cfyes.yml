name: CloudFlareYes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Process API Data
        run: |
          python << 'EOF'
          import requests
          import os
          from datetime import datetime, timedelta

          bj_time = (datetime.utcnow() + timedelta(hours=8)).strftime('%m-%d %H:%M')
          dir_name = "cfyes"
          os.makedirs(dir_name, exist_ok=True)
          
          url = "https://api.hostmonit.com/get_optimization_ip"
          headers = {"Content-Type": "application/json"}
          line_map = {"CM": "移动", "CU": "联通", "CT": "电信"}
            
          def fetch_and_process(ip_type, file_name):
              payload = {"key": "iDetkOys", "type": ip_type}
              data = []
              
              for i in range(2):
                  try:
                      response = requests.post(url, json=payload, headers=headers, timeout=10)
                      if response.status_code == 200:
                          data = response.json().get("info", [])
                          break
                      else:
                          print(f"尝试 {i+1}: 请求 {ip_type} 返回状态码 {response.status_code}")
                  except Exception as e:
                      print(f"尝试 {i+1}: 请求 {ip_type} 发生异常: {e}")
              
              if not data:
                  print(f"警告：{ip_type} 数据获取失败，跳过写入。")
                  return

              ip_nodes = []
              for item in data:
                  ip = item.get("ip")
                  line = line_map.get(item.get("line"), "未知")
                  if ip:
                      formatted_ip = f"[{ip}]" if ip_type == "v6" else ip
                      node = f"{formatted_ip}:443#CFYes优选 | {line} | {formatted_ip}"
                      ip_nodes.append(node)

              file_path = os.path.join(dir_name, file_name)
              header_label = "IPv4" if ip_type == "v4" else "IPv6"
              
              final_output = [
                  f"162.159.198.1:443#CFYes优选{header_label} | {bj_time} | BestCF.pages.dev",
                  *ip_nodes,
                  f"162.159.197.1:443#CFYes优选{header_label} | 分享免费优选网 BestCF.pages.dev"
              ]
              
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write("\n".join(final_output))
              print(f"{file_name} 更新成功，共 {len(ip_nodes)} 个节点。")

          fetch_and_process("v4", "ipv4.txt")
          fetch_and_process("v6", "ipv6.txt")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cfyes/*.txt
          if git diff --staged --quiet; then
            echo "无变动"
          else
            BJ_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
            git commit -m "CFYes $BJ_TIME"
            git push origin main
          fi