name: vvhan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Process API Data
        run: |
          python << 'EOF'
          import requests
          import os
          from datetime import datetime, timedelta

          # 1. 获取北京时间
          bj_time = (datetime.utcnow() + timedelta(hours=8)).strftime('%m-%d %H:%M')
          url = "https://api.4ce.cn/api/bestCFIP"
          dir_name = "vvhan"
          os.makedirs(dir_name, exist_ok=True)

          def process_version(data_key, file_name):
              ip_nodes = []
              # 按照 移动 -> 联通 -> 电信 排序
              order = [("CM", "移动"), ("CU", "联通"), ("CT", "电信")]
              
              v_data = res_json.get("data", {}).get(data_key, {})
              for key, label in order:
                  nodes = v_data.get(key, [])
                  for node in nodes:
                      ip = node.get("ip")
                      colo = node.get("colo", "Unknown") # 提取 JSON 中的 colo
                      if ip:
                          # --- 核心修改：针对 IPv6 自动添加方括号 ---
                          if data_key == "v6":
                              line = f"[{ip}]:443#vvHan优选 | {label} | {colo} | {ip}"
                          else:
                              line = f"{ip}:443#vvHan优选 | {label} | {colo} | {ip}"
                          ip_nodes.append(line)
              
              if not ip_nodes:
                  print(f"未发现 {data_key} 有效节点。")
                  return

              file_path = os.path.join(dir_name, file_name)
              should_write = True
              
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      old_content = f.readlines()
                      old_ips = [line.strip() for line in old_content[1:-1] if line.strip()]
                      if old_ips == ip_nodes:
                          print(f"{file_name} 内容实质一致，跳过更新。")
                          should_write = False

              if should_write:
                  final_output = []
                  header_label = "IPv4" if data_key == "v4" else "IPv6"
                  final_output.append(f"162.159.198.1:443#vvHan优选{header_label} | {bj_time} | BestCF.pages.dev")
                  final_output.extend(ip_nodes)
                  final_output.append(f"162.159.197.1:443#vvHan优选{header_label} | 分享免费优选网 BestCF.pages.dev")
                  
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.write("\n".join(final_output))
                  print(f"{file_name} 更新成功，共 {len(ip_nodes)} 个节点。")

          try:
              response = requests.get(url, timeout=15)
              res_json = response.json()
              if res_json.get("success"):
                  process_version("v4", "ipv4.txt")
                  process_version("v6", "ipv6.txt")
              else:
                  print("API 请求失败")
          except Exception as e:
              print(f"异常: {e}")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add vvhan/*.txt
          if git diff --staged --quiet; then
            echo "无变动"
          else
            BJ_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
            git commit -m "vvHan $BJ_TIME"
            git pull --rebase origin main
            git push origin main
          fi