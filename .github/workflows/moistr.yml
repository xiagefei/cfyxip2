name: moistr

on:
  workflow_dispatch:

jobs:
  fetch_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 请求订阅并校验数据
        env:
          MOISTR_URL: ${{ secrets.MOISTR_URL }}
        run: |
          echo "开始请求目标链接..."
          
          if [ -z "$MOISTR_URL" ]; then
            echo "错误：未检测到 MOISTR_URL"
            exit 1
          fi
          
          if ! curl -sS -L -A "Clash" --retry 3 --retry-delay 3 "$MOISTR_URL" -o raw_nodes.txt; then
            echo "错误：请求目标链接失败！"
            exit 1
          fi

          if [ ! -s raw_nodes.txt ]; then
            echo "错误：下载的内容为空！"
            exit 1
          fi

          # 使用正则匹配标准的 [IP/域名:端口] 并统计行数
          NODE_COUNT=$(grep -c -E '[0-9a-zA-Z\.-]+:[0-9]+' raw_nodes.txt || true)
          
          echo "检查完毕，当前下载的文件中包含有效节点数量: $NODE_COUNT"

          if [ "$NODE_COUNT" -lt 3 ]; then
            echo "=========================================================="
            echo "❌ 警告：检测到有效节点数量 ($NODE_COUNT) 少于 3 个！"
            echo "为了保护原有数据不被污染，本次工作流将拒绝写入并强行终止！"
            echo "=========================================================="
            exit 1
          fi

          # 创建目标文件夹
          mkdir -p moistr
          
          # 校验通过，将下载的原始节点数据写入最终文件
          cat raw_nodes.txt > moistr/all.txt
          
          # 确保文件末尾有一个干净的换行符
          if [ "$(tail -c1 moistr/all.txt)" != "" ]; then
            echo "" >> moistr/all.txt
          fi
          
          echo "数据校验通过，all.txt 文件生成成功！"

      - name: 提交并推送文件
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add moistr/all.txt
          
          # 检查文件是否有变化，有变化才提交
          if git diff --cached --quiet; then
            echo "数据未发生变化，跳过本次提交。"
          else
            git commit -m "moistr $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi