name: Update GitHub Client Versions

on:
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run version scraper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'EOF'
          import re
          import os
          import requests
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry
          from bs4 import BeautifulSoup

          def get_session():
              session = requests.Session()
              retry = Retry(total=2, backoff_factor=1, status_forcelist=[500, 502, 503, 504])
              adapter = HTTPAdapter(max_retries=retry)
              session.mount('https://', adapter)
              return session

          def get_latest_release(session, owner, repo, token):
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              headers = {"Authorization": f"token {token}"}
              try:
                  response = session.get(url, headers=headers, timeout=10)
                  if response.status_code == 200:
                      tag = response.json().get('tag_name', '')
                      if tag:
                          tag_lower = tag.lower()
                          if tag_lower.startswith('v'):
                              return tag[1:]
                          return tag
              except Exception as e:
                  print(f"Error fetching {owner}/{repo}: {e}")
              return None

          def main():
              version_data = {}
              file_path = 'client-ver.txt'
              
              if os.path.exists(file_path):
                  with open(file_path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if '|' in line:
                              parts = line.strip().split('|', 1)
                              if len(parts) == 2:
                                  version_data[parts[0]] = parts[1]

              if not os.path.exists('index.html'):
                  print("index.html not found")
                  return

              with open('index.html', 'r', encoding='utf-8') as f:
                  soup = BeautifulSoup(f, 'html.parser')

              container = soup.find('section', id='khd')
              if not container:
                  print("Section #khd not found")
                  return

              links = container.find_all('a', href=re.compile(r'github\.com/([^/]+)/([^/]+)'))
              session = get_session()
              token = os.getenv('GH_TOKEN')
              
              for link in links:
                  href = link.get('href')
                  match = re.search(r'github\.com/([^/]+)/([^/]+)', href)
                  if match:
                      owner = match.group(1)
                      repo = match.group(2).replace('.git', '').split('?')[0].split('#')[0]
                      repo_key = f"{owner}/{repo}"
                      
                      print(f"Checking {repo_key}...")
                      new_version = get_latest_release(session, owner, repo, token)
                      
                      if new_version:
                          version_data[repo_key] = new_version
                      else:
                          print(f"Keeping existing or skipping {repo_key}")

              if version_data:
                  with open(file_path, 'w', encoding='utf-8') as f:
                      for k in sorted(version_data.keys()):
                          f.write(f"{k}|{version_data[k]}\n")
                  print(f"Successfully updated {file_path}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add client-ver.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update client versions [skip ci]" && git push)