name: Update GitHub Client Versions

on:
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run version scraper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python << 'EOF'
          import re
          import os
          import requests
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone, timedelta

          def get_session():
              session = requests.Session()
              retry = Retry(total=2, backoff_factor=1, status_forcelist=[500, 502, 503, 504])
              adapter = HTTPAdapter(max_retries=retry)
              session.mount('https://', adapter)
              return session

          def get_latest_release(session, owner, repo, token):
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              headers = {"Authorization": f"token {token}"}
              try:
                  response = session.get(url, headers=headers, timeout=10)
                  if response.status_code == 200:
                      data = response.json()
                      tag = data.get('tag_name', '')
                      published_at = data.get('published_at', '') # UTC 时间格式: 2026-06-16T08:00:00Z
                      
                      if tag:
                          tag_lower = tag.lower()
                          if tag_lower.startswith('v'):
                              tag = tag[1:]
                      
                      # 转换 UTC 时间为北京时间 (UTC+8)
                      bj_date_str = ""
                      if published_at:
                          try:
                              # 解析 ISO 格式的 UTC 时间
                              utc_dt = datetime.strptime(published_at, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
                              # 转换为北京时间
                              bj_dt = utc_dt.astimezone(timezone(timedelta(hours=8)))
                              bj_date_str = bj_dt.strftime("%Y-%m-%d")
                          except Exception as te:
                              print(f"Time parse error for {owner}/{repo}: {te}")
                              
                      return tag, bj_date_str
              except Exception as e:
                  print(f"Error fetching {owner}/{repo}: {e}")
              return None, None

          def main():
              version_data = {}
              file_path = 'client-ver.txt'
              
              # 忽略项目列表
              ignore_list = {
                "kenzok8/openwrt-packages",
                "bcseputetto/Are-u-ok",
                "zero-peak/ZeroOmega",
                "MetaCubeX/Yacd-meta",
                "metacubex/metacubexd",
                "Zephyruso/zashboard",
                "2dust/v2rayn"
            }
              
              if os.path.exists(file_path):
                  with open(file_path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if '|' in line:
                              parts = line.strip().split('|')
                              # 兼容旧格式或匹配新格式
                              if len(parts) >= 2:
                                  version_data[parts[0]] = {
                                      "ver": parts[1],
                                      "date": parts[2] if len(parts) == 3 else ""
                                  }

              if not os.path.exists('index.html'):
                  print("index.html not found")
                  return

              with open('index.html', 'r', encoding='utf-8') as f:
                  soup = BeautifulSoup(f, 'html.parser')

              container = soup.find('section', id='khd')
              if not container:
                  print("Section #khd not found")
                  return

              links = container.find_all('a', href=re.compile(r'github\.com/([^/]+)/([^/]+)'))
              session = get_session()
              token = os.getenv('GH_TOKEN')
              
              for link in links:
                  href = link.get('href')
                  match = re.search(r'github\.com/([^/]+)/([^/]+)', href)
                  if match:
                      owner = match.group(1)
                      repo = match.group(2).replace('.git', '').split('?')[0].split('#')[0]
                      repo_key = f"{owner}/{repo}"
                      
                      if repo_key in ignore_list:
                        print(f"Skipping ignored repository: {repo_key}")
                        continue
                      
                      print(f"Checking {repo_key}...")
                      new_version, new_date = get_latest_release(session, owner, repo, token)
                      
                      if new_version:
                          version_data[repo_key] = {"ver": new_version, "date": new_date}
                      else:
                          print(f"Keeping existing or skipping {repo_key}")

              if version_data:
                  with open(file_path, 'w', encoding='utf-8') as f:
                      for k in sorted(version_data.keys()):
                          ver = version_data[k]["ver"]
                          date = version_data[k]["date"]
                          if date:
                              f.write(f"{k}|{ver}|{date}\n")
                          else:
                              f.write(f"{k}|{ver}\n")
                  print(f"Successfully updated {file_path}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add client-ver.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "update client versions" && git push)